<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 120">
  <!-- Shoes -->
  <ellipse cx="28" cy="116" rx="14" ry="6" fill="#7B3A00"/>
  <ellipse cx="62" cy="116" rx="14" ry="6" fill="#7B3A00"/>
  <!-- Legs -->
  <rect x="20" y="96" width="14" height="22" rx="4" fill="#FFD700" stroke="#C9A000" stroke-width="1.5"/>
  <rect x="56" y="96" width="14" height="22" rx="4" fill="#FFD700" stroke="#C9A000" stroke-width="1.5"/>
  <!-- Pants -->
  <rect x="8" y="74" width="74" height="26" rx="5" fill="#7B4A10" stroke="#5C3308" stroke-width="2"/>
  <!-- Belt -->
  <rect x="8" y="71" width="74" height="8" fill="#3D1F05"/>
  <rect x="32" y="69" width="26" height="11" rx="2" fill="#C9A000" stroke="#A07800" stroke-width="1"/>
  <!-- Body -->
  <rect x="8" y="8" width="74" height="68" rx="7" fill="#FFD700" stroke="#C9A000" stroke-width="2"/>
  <!-- Sponge pores -->
  <circle cx="22" cy="18" r="4.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="50" cy="13" r="3.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="72" cy="22" r="5.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="16" cy="38" r="3.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="68" cy="46" r="4.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="38" cy="66" r="3.5" fill="#E6B800" opacity="0.85"/>
  <circle cx="66" cy="65" r="3" fill="#E6B800" opacity="0.85"/>
  <!-- White shirt collar -->
  <rect x="24" y="60" width="42" height="14" rx="3" fill="white"/>
  <!-- Red tie -->
  <polygon points="45,58 50,66 45,74 40,66" fill="#CC0000" stroke="#AA0000" stroke-width="1"/>
  <!-- Arms -->
  <path d="M8 50 Q-6 58 2 68" stroke="#FFD700" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M82 50 Q96 58 88 68" stroke="#FFD700" stroke-width="10" fill="none" stroke-linecap="round"/>
  <circle cx="0" cy="64" r="7" fill="#FFD700" stroke="#C9A000" stroke-width="1.5"/>
  <circle cx="90" cy="64" r="7" fill="#FFD700" stroke="#C9A000" stroke-width="1.5"/>
  <!-- Eyes whites -->
  <circle cx="30" cy="38" r="15" fill="white" stroke="#CCC" stroke-width="1"/>
  <circle cx="60" cy="38" r="15" fill="white" stroke="#CCC" stroke-width="1"/>
  <!-- Iris -->
  <circle cx="30" cy="38" r="9.5" fill="#5BAADD"/>
  <circle cx="60" cy="38" r="9.5" fill="#5BAADD"/>
  <!-- Pupil -->
  <circle cx="32" cy="36" r="6.5" fill="#111"/>
  <circle cx="62" cy="36" r="6.5" fill="#111"/>
  <!-- Eye shine -->
  <circle cx="33" cy="34" r="2.5" fill="white"/>
  <circle cx="63" cy="34" r="2.5" fill="white"/>
  <!-- Eyelashes -->
  <path d="M16 25 Q30 21 44 25" stroke="#333" stroke-width="2.5" fill="none"/>
  <path d="M46 25 Q60 21 74 25" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Freckles -->
  <circle cx="16" cy="54" r="4" fill="#FFB347" opacity="0.85"/>
  <circle cx="74" cy="54" r="4" fill="#FFB347" opacity="0.85"/>
  <!-- Nose -->
  <path d="M38 48 Q45 58 52 48" fill="#FFCC00" stroke="#E6AA00" stroke-width="1.5"/>
  <!-- Mouth -->
  <path d="M24 62 Q45 72 66 62" stroke="#333" stroke-width="2.5" fill="none"/>
  <!-- Buck teeth -->
  <rect x="34" y="61" width="9" height="6" fill="white" rx="1.5"/>
  <rect x="47" y="61" width="9" height="6" fill="white" rx="1.5"/>
</svg>
